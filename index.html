    <style>
      :root {
        color-scheme: light;
        --paper: #fbfaf6;
        --paper-warm: #fff8e8;
        --ink: #2b251d;
        --muted: #776d5f;
        --gold: #d4a33f;
        --gold-bright: #f6d875;
        --gold-deep: #9e6c13;
        --money: #9fb7c7;
        --money-deep: #6d8fa1;
        --green: #315c51;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.98) 0 28%, rgba(255, 255, 255, 0) 58%),
          radial-gradient(circle at 78% 70%, rgba(245, 209, 103, 0.28), rgba(245, 209, 103, 0) 32%),
          radial-gradient(circle at 18% 70%, rgba(139, 171, 190, 0.2), rgba(139, 171, 190, 0) 34%),
          linear-gradient(180deg, #f5f8f7 0%, var(--paper) 48%, var(--paper-warm) 100%);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      .app {
        min-height: 100svh;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
      }

      .app::before {
        content: "";
        position: absolute;
        inset: -12%;
        z-index: -3;
        background-image:
          radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.95) 0 8%, rgba(255, 255, 255, 0) 18%),
          radial-gradient(circle at 50% 88%, rgba(255, 255, 255, 0.94) 0 10%, rgba(255, 255, 255, 0) 25%),
          radial-gradient(circle at 82% 82%, rgba(255, 255, 255, 0.93) 0 8%, rgba(255, 255, 255, 0) 22%);
        filter: blur(2px);
      }

      .app::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          repeating-linear-gradient(
            110deg,
            rgba(255, 255, 255, 0.18) 0 1px,
            rgba(255, 255, 255, 0) 1px 18px
          );
        opacity: 0.7;
        mix-blend-mode: screen;
      }

      .scene {
        position: absolute;
        inset: auto -24vw -12vw;
        z-index: -1;
        width: 148vw;
        height: min(68svh, 660px);
        min-height: 430px;
        pointer-events: none;
      }

      .photo-stage {
        position: absolute;
        inset: auto 0 1svh;
        z-index: -2;
        height: min(52svh, 500px);
        margin: 0;
        opacity: 0;
        overflow: hidden;
        pointer-events: none;
        -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 16%, #000 88%, transparent 100%);
        mask-image: linear-gradient(180deg, transparent 0%, #000 16%, #000 88%, transparent 100%);
        transition: opacity 280ms ease;
      }

      .photo-stage img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
        filter: saturate(0.94) brightness(1.05);
      }

      .photo-stage::before,
      .photo-stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .photo-stage::before {
        background:
          linear-gradient(180deg, var(--paper) 0%, rgba(251, 250, 246, 0.72) 16%, rgba(251, 250, 246, 0.08) 40%),
          linear-gradient(90deg, rgba(251, 250, 246, 0.86), rgba(251, 250, 246, 0) 22%, rgba(251, 250, 246, 0) 78%, rgba(251, 250, 246, 0.86));
      }

      .photo-stage::after {
        background: linear-gradient(0deg, rgba(251, 250, 246, 0.92) 0%, rgba(251, 250, 246, 0) 30%);
      }

      .app.has-photo .photo-stage {
        opacity: 1;
      }

      .app.has-photo .scene {
        opacity: 0;
      }

      .app.has-photo .countdown {
        padding-bottom: 36svh;
      }

      .countdown {
        width: min(620px, 100%);
        margin: 0 auto;
        align-self: center;
        display: grid;
        justify-items: center;
        text-align: center;
        padding: 8svh 0 24svh;
      }

      .date-chip {
        margin: 0 0 18px;
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid rgba(202, 158, 65, 0.38);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--gold-deep);
        font-size: 14px;
        font-weight: 800;
        box-shadow: 0 14px 40px rgba(158, 108, 19, 0.08);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        max-width: 12em;
        color: var(--green);
        font-size: clamp(26px, 7.4vw, 50px);
        line-height: 1.16;
        font-weight: 900;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .days {
        margin-top: 10px;
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: clamp(8px, 2vw, 16px);
        width: 100%;
        color: var(--ink);
      }

      .days-number {
        font-size: clamp(76px, 23vw, 174px);
        line-height: 0.9;
        font-weight: 950;
        color: var(--gold-deep);
        font-variant-numeric: tabular-nums;
        text-shadow:
          0 2px 0 rgba(255, 255, 255, 0.84),
          0 18px 45px rgba(158, 108, 19, 0.16);
      }

      .days-unit {
        font-size: clamp(30px, 8.5vw, 58px);
        line-height: 1;
        font-weight: 900;
        color: var(--green);
      }

      .wish {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: clamp(15px, 4vw, 18px);
        font-weight: 700;
      }

      .footer {
        width: min(620px, 100%);
        margin: 0 auto;
        color: rgba(43, 37, 29, 0.58);
        font-size: 13px;
        line-height: 1.5;
        text-align: center;
      }

      .scene .blanket {
        fill: rgba(255, 255, 255, 0.9);
        filter: drop-shadow(0 -20px 40px rgba(101, 92, 80, 0.08));
      }

      .scene .fold {
        fill: none;
        stroke: rgba(216, 217, 212, 0.9);
        stroke-width: 5;
        stroke-linecap: round;
        opacity: 0.7;
      }

      .scene .bill {
        fill: rgba(236, 246, 248, 0.86);
        stroke: rgba(98, 134, 153, 0.52);
        stroke-width: 3;
        filter: drop-shadow(0 16px 18px rgba(86, 104, 112, 0.12));
      }

      .scene .bill-line {
        stroke: rgba(109, 143, 161, 0.58);
        stroke-width: 3;
        stroke-linecap: round;
      }

      .scene .bill-seal {
        fill: rgba(109, 143, 161, 0.2);
        stroke: rgba(109, 143, 161, 0.42);
        stroke-width: 3;
      }

      .scene .bar-top {
        fill: var(--gold-bright);
      }

      .scene .bar-side {
        fill: var(--gold);
      }

      .scene .bar-front {
        fill: #bf8320;
      }

      .scene .coin {
        fill: url(#coinGold);
        stroke: rgba(157, 101, 11, 0.45);
        stroke-width: 3;
        filter: drop-shadow(0 10px 10px rgba(157, 101, 11, 0.14));
      }

      .scene .coin-mark {
        fill: none;
        stroke: rgba(157, 101, 11, 0.45);
        stroke-width: 3;
      }

      .scene .bundle {
        fill: rgba(255, 255, 255, 0.92);
        stroke: rgba(225, 226, 219, 0.88);
        stroke-width: 4;
        filter: drop-shadow(0 20px 28px rgba(93, 84, 75, 0.08));
      }

      .scene .collar {
        fill: rgba(239, 186, 65, 0.52);
      }

      @media (min-width: 760px) {
        .countdown {
          padding-top: 3svh;
          padding-bottom: 18svh;
        }

        .scene {
          inset: auto -10vw -18vw;
          width: 120vw;
          height: min(72svh, 720px);
        }

        .photo-stage {
          bottom: 0;
          height: min(54svh, 540px);
        }
      }

      @media (max-width: 380px) {
        .app {
          padding-left: 14px;
          padding-right: 14px;
        }

        .countdown {
          padding-bottom: 28svh;
        }

        .app.has-photo .countdown {
          padding-bottom: 38svh;
        }

        .days-number {
          font-size: clamp(70px, 22vw, 96px);
        }
      }
    </style>
  </head>
  <body>

      </figure>

        <g transform="translate(632 305) rotate(11)">
          <polygon class="bar-top" points="28 0 150 0 184 58 0 58" />

          <circle class="coin" cx="0" cy="0" r="19" />

      </svg>

      <main class="countdown" id="countdown" aria-live="polite">
        <p class="date-chip" id="dateText">2037年6月7日</p>
        <h1 id="headline">距离王当当高考还有</h1>
        <div class="days">
          <span class="days-number" id="daysNumber">0</span>
          <span class="days-unit" id="daysUnit">天</span>
        </div>
        <p class="wish" id="wishText">金榜题名，一路生花</p>
      </main>

      <footer class="footer" id="todayText">今天</footer>
    </div>

    <script>
      const targetDate = "2037-06-07";
      const eventName = "王当当高考";

      const els = {
        countdown: document.querySelector("#countdown"),
        app: document.querySelector(".app"),
        memoryPhoto: document.querySelector("#memoryPhoto"),
        dateText: document.querySelector("#dateText"),
        headline: document.querySelector("#headline"),
        daysNumber: document.querySelector("#daysNumber"),
        daysUnit: document.querySelector("#daysUnit"),
        wishText: document.querySelector("#wishText"),
        todayText: document.querySelector("#todayText"),
      };

      function getLocalToday() {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate());
      }

      function toDateInputValue(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatDate(dateValue) {
        const [year, month, day] = dateValue.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "short",
        }).format(date);
      }

      function daysBetween(dateValue) {
        const today = getLocalToday();
        const [year, month, day] = dateValue.split("-").map(Number);
        const target = new Date(year, month - 1, day);
        const todayUtc = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
        const targetUtc = Date.UTC(target.getFullYear(), target.getMonth(), target.getDate());
        return Math.round((targetUtc - todayUtc) / 86400000);
      }

      function render() {
        const diff = daysBetween(targetDate);
        const absDiff = Math.abs(diff);

        els.dateText.textContent = formatDate(targetDate);
        els.daysNumber.textContent = String(absDiff);
        els.todayText.textContent = `今天是 ${formatDate(toDateInputValue(getLocalToday()))}`;

        if (diff > 0) {
          els.headline.textContent = `距离${eventName}还有`;
          els.daysUnit.textContent = "天";
          els.wishText.textContent = "金榜题名，一路生花";
          els.countdown.setAttribute("aria-label", `距离${eventName}还有${absDiff}天`);
          document.title = `距离${eventName}还有 ${absDiff} 天`;
        } else if (diff === 0) {
          els.headline.textContent = `${eventName}就在今天`;
          els.daysUnit.textContent = "天";
          els.wishText.textContent = "从容上场，得偿所愿";
          els.countdown.setAttribute("aria-label", `${eventName}就在今天`);
          document.title = `${eventName}就在今天`;
        } else {
          els.headline.textContent = `${eventName}已经过去`;
          els.daysUnit.textContent = "天";
          els.wishText.textContent = "每一步都算数";
          els.countdown.setAttribute("aria-label", `${eventName}已经过去${absDiff}天`);
          document.title = `${eventName}已经过去 ${absDiff} 天`;
        }
      }

      els.memoryPhoto.addEventListener("load", () => {
        els.app.classList.add("has-photo");
      });

      els.memoryPhoto.addEventListener("error", () => {
        els.memoryPhoto.removeAttribute("src");
        els.app.classList.remove("has-photo");
      });

      render();
      window.setInterval(render, 60 * 1000);
    </script>
  </body>
